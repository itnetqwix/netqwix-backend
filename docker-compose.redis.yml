# Local Redis for NetQwix API development.
# Usage: docker compose -f docker-compose.redis.yml up -d
services:
  redis:
    image: redis:7-alpine
    container_name: nq-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - nq_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  nq_redis_data:

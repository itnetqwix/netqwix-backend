name: Deploy Backend

on:
  push:
    branches:
      - pre_production
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Typecheck and build
        run: |
          export NODE_OPTIONS="--max-old-space-size=1536"
          npm run build

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/pre_production'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy staging to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          timeout: 300s
          script: |
            set -e

            echo "🚀 Starting STAGING deployment..."

            echo "📂 Moving to project directory"
            cd /home/ubuntu/nq-backend

            echo "🔄 Fetching latest code"
            git fetch origin

            echo "📌 Resetting to latest pre_production"
            git reset --hard origin/pre_production

            echo "📦 Installing dependencies"
            npm install --no-audit --no-fund

            echo "🏗️ Building project"
            export NODE_OPTIONS="--max-old-space-size=1536"
            npm run build

            echo "♻️ Starting or reloading PM2 (ecosystem cluster)"
            export PM2_APP_NAME=netqwix-api-staging
            if pm2 describe "$PM2_APP_NAME" > /dev/null 2>&1; then
              PM2_APP_NAME="$PM2_APP_NAME" pm2 reload ecosystem.config.js --env staging --update-env
            else
              pm2 delete netqwix-api-staging 2>/dev/null || true
              PM2_APP_NAME="$PM2_APP_NAME" pm2 start ecosystem.config.js --env staging
            fi

            pm2 save

            echo "✅ Staging deployment completed successfully"

  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to production EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          timeout: 300s
          script: |
            set -e

            echo "🚀 Starting PRODUCTION deployment..."

            echo "📂 Moving to project directory"
            cd /home/ubuntu/nq-backend

            echo "🔄 Fetching latest code"
            git fetch origin

            echo "📌 Resetting to latest main"
            git reset --hard origin/main

            echo "📦 Installing dependencies"
            npm install --no-audit --no-fund

            echo "🏗️ Building project"
            export NODE_OPTIONS="--max-old-space-size=1536"
            npm run build

            echo "♻️ Starting or reloading PM2 (ecosystem cluster)"
            export PM2_APP_NAME=netqwix-api-prod
            if pm2 describe "$PM2_APP_NAME" > /dev/null 2>&1; then
              PM2_APP_NAME="$PM2_APP_NAME" pm2 reload ecosystem.config.js --env production --update-env
            else
              pm2 delete netqwix-api-prod 2>/dev/null || true
              pm2 delete netqwix-api 2>/dev/null || true
              PM2_APP_NAME="$PM2_APP_NAME" pm2 start ecosystem.config.js --env production
            fi

            pm2 save

            echo "✅ Production deployment completed successfully"
